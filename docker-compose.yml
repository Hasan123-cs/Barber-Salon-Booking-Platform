services:

  postgres:
    image: postgres:16

    container_name: barber-db

    restart: always

    environment:
      POSTGRES_DB: BarberSalonDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d BarberSalonDB"]
      interval: 5s
      timeout: 5s
      retries: 10


  web:

    build: .

    container_name: barber-web

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      CONNECTION_STRING: Host=postgres;Port=5432;Database=BarberSalonDB;Username=postgres;Password=${DB_PASSWORD}
      Supabase__Url: "${SUPABASE_URL}"
      Supabase__Key: "${SUPABASE_KEY}"


volumes:
  postgres-data: